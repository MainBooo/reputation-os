version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: reputation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reputation_os
    ports:
      - "5543:5432"
    volumes:
      - reputation_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: reputation-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - reputation_redis_data:/data

volumes:
  reputation_postgres_data:
  reputation_redis_data:
